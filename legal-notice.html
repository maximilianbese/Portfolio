<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legal Notice | Maximilian Bese</title>
    <link rel="icon" type="image/png" href="./img/favicon.png" />

    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/sections.css" />
    <link rel="stylesheet" href="./css/overlay.css" />
    <link rel="stylesheet" href="./css/legal-notice.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"

    />
  </head>
  <body style="background: var(--bg)">
    <header class="legal-header">
      <div class="legal-header-content">
        <a href="index.html" class="footer-logo" style="margin: 0">
          <img src="./img/logo.png" alt="MB Logo" class="footer-logo-img" />
          <span class="footer-logo-name">Maximilian<br />Bese</span>
        </a>
      </div>
    </header>

    <main class="legal-main">
      <div class="proj-overlay-card">
        <a
          href="index.html"
          class="proj-overlay-close"
          style="text-decoration: none"
          >✕</a
        >

        <div class="legal-content-padding">
          <h1 class="mono accent">Legal Notice</h1>

          <div class="legal-visual-line">
            <section class="legal-block">
              <p class="mono accent label">Information according to § 5 TMG</p>
              <p class="legal-body-text">
                Maximilian Bese<br />
                [Deine Straße Hausnummer]<br />
                [PLZ Stadt]
              </p>
            </section>

            <section class="legal-block">
              <p class="mono accent label">Contact</p>
              <p class="legal-body-text">
                E-Mail:
                <a href="mailto:maximilian-bese@gmx.de" class="accent"
                  >maximilian-bese@gmx.de</a
                >
              </p>
            </section>

            <section class="legal-block">
              <p class="mono accent label">
                Responsible for content according to § 55 Abs. 2 RStV
              </p>
              <p class="legal-body-text">
                Maximilian Bese<br />
                [Deine Adresse]
              </p>
            </section>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
