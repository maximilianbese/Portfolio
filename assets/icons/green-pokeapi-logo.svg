<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Pokeball shape in green -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#3dcfb6" stroke-width="4"/>
  <!-- Top half -->
  <path d="M2 50 A48 48 0 0 1 98 50 Z" fill="#3dcfb620"/>
  <!-- Bottom half -->
  <path d="M2 50 A48 48 0 0 0 98 50 Z" fill="#3dcfb610"/>
  <!-- Center line -->
  <line x1="2" y1="50" x2="98" y2="50" stroke="#3dcfb6" stroke-width="4"/>
  <!-- Center button outer -->
  <circle cx="50" cy="50" r="14" fill="#0b0b0b" stroke="#3dcfb6" stroke-width="4"/>
  <!-- Center button inner -->
  <circle cx="50" cy="50" r="7" fill="#3dcfb6"/>
</svg>
